name: Pull Request Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  issues: read

jobs:
  label-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Copy Labels from Linked Issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const prUser = context.payload.pull_request.user.login;

            console.log(`Processing PR #${prNumber} by @${prUser}`);

            const issueLabels = new Set();

            // 1. Find linked issues via GraphQL closingIssuesReferences
            try {
              const query = `
                query($owner: String!, $repo: String!, $prNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $prNumber) {
                      closingIssuesReferences(first: 10) {
                        nodes {
                          number
                          labels(first: 50) {
                            nodes {
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const variables = { owner, repo, prNumber };
              const result = await github.graphql(query, variables);
              const nodes = result.repository?.pullRequest?.closingIssuesReferences?.nodes || [];
              console.log(`GraphQL found ${nodes.length} closing issue references.`);
              for (const node of nodes) {
                console.log(`Linked closing issue: #${node.number}`);
                for (const label of node.labels.nodes) {
                  issueLabels.add(label.name);
                }
              }
            } catch (error) {
              console.warn(`GraphQL closingIssuesReferences failed, continuing with regex fallback. Error: ${error.message}`);
            }

            // 2. Regex fallback (parse PR body, title, branch ref for references like #123)
            const issueNumbers = [];
            const body = context.payload.pull_request.body || "";
            const bodyMatches = [...body.matchAll(/#(\d+)/g)];
            for (const match of bodyMatches) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            const title = context.payload.pull_request.title || "";
            const titleMatches = [...title.matchAll(/#(\d+)/g)];
            for (const match of titleMatches) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            const branchName = context.payload.pull_request.head.ref || "";
            const branchMatches = [...branchName.matchAll(/(?:issue|bug|feature)[-_](\d+)/gi)];
            for (const match of branchMatches) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            const branchNumMatch = branchName.match(/^(\d+)/);
            if (branchNumMatch) {
              issueNumbers.push(parseInt(branchNumMatch[1], 10));
            }

            const uniqueIssues = [...new Set(issueNumbers)];
            console.log(`Regex parsed referenced issues: ${uniqueIssues}`);

            for (const issue_number of uniqueIssues) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number
                });
                
                // Exclude pull requests (GitHub API for get issue can return PR metadata)
                if (issue.pull_request) {
                  continue;
                }

                console.log(`Found referenced issue #${issue_number} with labels:`, issue.labels.map(l => l.name));
                if (issue.labels) {
                  for (const label of issue.labels) {
                    const labelName = typeof label === 'string' ? label : label.name;
                    issueLabels.add(labelName);
                  }
                }
              } catch (error) {
                console.log(`Could not fetch issue #${issue_number} details: ${error.message}`);
              }
            }

            // 3. Add accumulated labels to PR
            if (issueLabels.size > 0) {
              const labelsToAdd = Array.from(issueLabels);
              console.log(`Adding labels to PR #${prNumber}:`, labelsToAdd);
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: labelsToAdd
                });
                console.log(`Successfully labeled PR #${prNumber}`);
              } catch (error) {
                console.error(`Failed to add labels to PR #${prNumber}: ${error.message}`);
              }
            } else {
              console.log("No labels to copy from linked issues.");
            }
